name: Build Analytics & README

on:
  workflow_run:
    workflows: ["Generate Metrics"]
    types:
      - completed
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "scripts/**"
      - "templates/**"
      - ".github/workflows/analytics.yml"
      - ".github/workflows/metrics.yml"

concurrency:
  group: profile-stats-pipeline
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Require PERSONAL_GITHUB_TOKEN
        env:
          PERSONAL_GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        run: |
          if [ -z "${PERSONAL_GITHUB_TOKEN}" ]; then
            echo "Missing required secret: PERSONAL_GITHUB_TOKEN"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build README
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          GITHUB_USERNAME: jguida941
        run: python scripts/build_readme.py

      - name: Validate generated profile data
        env:
          GITHUB_USERNAME: jguida941
        run: python scripts/validate_generated_profile.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update analytics & readme [skip ci]"
          branch: main
          file_pattern: "README.md assets/*.svg"
