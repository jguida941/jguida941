name: Build Analytics & README

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "scripts/**"
      - "templates/**"
      - ".github/workflows/analytics.yml"
      - ".github/workflows/metrics.yml"

concurrency:
  group: profile-stats-pipeline
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve GitHub token
        env:
          CANDIDATE_PAT: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          DEFAULT_TOKEN: ${{ github.token }}
        run: |
          use_default() {
            {
              echo "PERSONAL_GITHUB_TOKEN="
              echo "GITHUB_TOKEN=${DEFAULT_TOKEN}"
              echo "GH_TOKEN=${DEFAULT_TOKEN}"
              echo "PROFILE_TOKEN_MODE=github_token"
            } >> "$GITHUB_ENV"
          }
          if [ -z "${CANDIDATE_PAT}" ]; then use_default; exit 0; fi
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${CANDIDATE_PAT}" https://api.github.com/user || echo 000)
          if [ "${code}" = "200" ]; then
            echo "::notice::PERSONAL_GITHUB_TOKEN healthy."
            {
              echo "PERSONAL_GITHUB_TOKEN=${CANDIDATE_PAT}"
              echo "GITHUB_TOKEN=${DEFAULT_TOKEN}"
              echo "GH_TOKEN=${CANDIDATE_PAT}"
              echo "PROFILE_TOKEN_MODE=personal_github_token"
            } >> "$GITHUB_ENV"
          else
            echo "::warning::PERSONAL_GITHUB_TOKEN returned HTTP ${code}; using github.token."
            use_default
          fi

      - name: Generate and validate profile artifacts
        env:
          GITHUB_USERNAME: jguida941
          PROFILE_TIMEZONE: America/New_York
        run: |
          echo "Token mode: ${PROFILE_TOKEN_MODE}"
          python scripts/profile_cli.py doctor --fail-on critical
          python scripts/profile_cli.py generate-profile --validate
          python scripts/profile_cli.py triage --workflow "Generate Metrics" --limit 20 --fail-on critical

      - name: Upload diagnostics artifacts
        uses: actions/upload-artifact@v4
        with:
          name: profile-diagnostics
          path: |
            site/data/triage_report.json
            site/data/doctor_report.json
            site/data/run_diagnostics.json
            site/data/run_diagnostics_history.jsonl

      - name: Upload rendered profile artifacts
        uses: actions/upload-artifact@v4
        with:
          name: profile-rendered-artifacts
          path: |
            README.md
            assets/*.svg
            site/data/profile_snapshot.json
            metrics.general.svg

      - uses: stefanzweifel/git-auto-commit-action@v5
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          commit_message: "update analytics & readme"
          branch: main
          file_pattern: "README.md assets/*.svg site/data/profile_snapshot.json metrics.general.svg"
