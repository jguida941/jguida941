name: Generate Metrics

on:
  schedule:
    # Run hourly off the top of the hour to reduce scheduler delay.
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: profile-stats-pipeline
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: General Stats
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || github.token }}
          user: jguida941
          filename: metrics.general.svg
          base: header, activity, community, repositories
          base_indepth: yes
          repositories: 500
          repositories_affiliations: owner
          repositories_forks: yes
          plugin_lines: yes
          plugin_lines_sections: base
          config_timezone: America/New_York
          config_order: base.header, base.activity+community, base.repositories

      - name: Check metrics.general.svg
        env:
          PERSONAL_GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN || github.token }}
          PROFILE_TIMEZONE: America/New_York
        run: python scripts/profile_cli.py check-metrics --path metrics.general.svg

      - name: Isometric Calendar
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || github.token }}
          user: jguida941
          filename: metrics.isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: America/New_York

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update metrics cards"
          branch: main
          file_pattern: "metrics.general.svg metrics.isocalendar.svg"
