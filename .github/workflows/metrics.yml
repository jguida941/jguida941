name: Generate Metrics

on:
  schedule:
    # Run hourly off the top of the hour to reduce scheduler delay.
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: profile-stats-pipeline
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and validate canonical profile artifacts
        env:
          PERSONAL_GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN || github.token }}
          GITHUB_USERNAME: jguida941
          PROFILE_TIMEZONE: America/New_York
        run: |
          if [ -n "${PERSONAL_GITHUB_TOKEN}" ]; then
            export PROFILE_TOKEN_MODE="personal_github_token"
          else
            export PROFILE_TOKEN_MODE="github_token"
          fi
          echo "Token mode: ${PROFILE_TOKEN_MODE}"
          python scripts/profile_cli.py generate-profile --validate

      - name: Check metrics.general.svg
        env:
          PERSONAL_GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN || github.token }}
          PROFILE_TIMEZONE: America/New_York
        run: python scripts/profile_cli.py check-metrics --path metrics.general.svg

      - name: Upload metrics artifacts
        uses: actions/upload-artifact@v4
        with:
          name: profile-hourly-artifacts
          path: |
            README.md
            assets/*.svg
            site/data/profile_snapshot.json
            metrics.general.svg

      - uses: stefanzweifel/git-auto-commit-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN || github.token }}
        with:
          commit_message: "update canonical profile artifacts"
          branch: main
          file_pattern: "README.md assets/*.svg site/data/profile_snapshot.json metrics.general.svg"
