# Process-doc currentness + adoption policy — policy-as-DATA (fail-closed).
# Ratified operator law: scratchpad/active/process/OPERATOR-POST-REVIEW-EXECUTION-LAW-2026-07-22.md
# Design: scratchpad/active/process/process-doc-currentness-adoption-design-r1.md
# RED: tests/contracts/test_process_docs_currency.py
# Regex values are TOML literal strings (backslashes stay literal); propositions are basic strings.

[meta]
contract_id = "ProcessDocsCurrencyPolicy"
schema_version = 1
ratified = "2026-07-22"
law_source = "scratchpad/active/process/OPERATOR-POST-REVIEW-EXECUTION-LAW-2026-07-22.md"
authority_doc = "AGENTS.md"

[roles]
conductor = "/root"
design_red_author = "fable"
green_builder = "opus"
reviewer = "codex"

[separation]
reviewer_may_author_red = false
red_author_may_build_green = false
author_approves_own_artifact = false

# PROC-CODE-REVIEWER-IDENTITY-001: the separation record is a CLOSED six-field identity
# payload. Missing/empty/non-string fields and any unknown field fail closed, so neither the
# RED author seat nor the GREEN builder seat can approve under a merely-fresh session id.
[separation.record_schema]
required_keys = [
  "red_author_seat",
  "red_author_session",
  "reviewer_seat",
  "reviewer_session",
  "green_builder_seat",
  "green_builder_session",
]
allow_unknown_keys = false

[successor]
max_conformance_checks = 1
required_next_event = "GREEN_DISPATCH"
green_builder = "opus"
forbidden_after_red_accepted = ["PROSE_REVIEW", "REVIEW_OF_REVIEW"]

# PROC-CODE-SUCCESSOR-IDENTITY-001: the GREEN_DISPATCH payload is a CLOSED three-field
# schema — required and allowed are the same roster, so an omitted field and a smuggled
# field (e.g. prose_review_waiver) both fail closed BEFORE seat/session semantics run.
[successor.dispatch_schema]
required_keys = ["builder_seat", "builder_session", "red_author_session"]
allowed_keys = ["builder_seat", "builder_session", "red_author_session"]

[lineage]
prose_review_cap = 2
terminal_verdicts = ["REVISE", "APPROVE"]
identity_preserving_events = ["CORRECTION", "RENAME", "VERSION_BUMP", "SUCCESSOR_PACKET"]
reset_events = []

[[review_families]]
family_id = "semantic-tdd-conductor-skill"
prose_reviews_used = 1
terminal_verdict_token = "SKILL-DESIGN-VERDICT: REVISE"
another_prose_review_authorized = false
